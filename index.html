<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <style>
        :root { --bg-dark: #05070f; --card-dark: #0b111e; --accent: #38bdf8; --primary-text: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--primary-text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .checkout-box { background: var(--card-dark); padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { text-align: center; color: var(--accent); margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #05070f; color: white; box-sizing: border-box; }
        .btn-order { width: 100%; padding: 14px; background: #25D366; border: none; border-radius: 10px; color: black; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="checkout-box">
    <h2>Secure Checkout</h2>
    <form id="checkoutForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="E.g. Tasnim Ahmed" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phoneNumber" placeholder="01XXXXXXXXX" required>
        </div>
        <div class="form-group">
            <label>Payment Method</label>
            <select id="paymentMethod">
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="Nagad">Nagad</option>
                <option value="Bkash">Bkash</option>
            </select>
        </div>
        <button type="button" class="btn-order" onclick="sendToWhatsApp()">Order via WhatsApp</button>
    </form>
    <a href="index.html" class="back-link">← Back to shop</a>
</div>

<script>
    function sendToWhatsApp() {
        const name = document.getElementById('fullName').value;
        const phone = document.getElementById('phoneNumber').value;
        const payment = document.getElementById('paymentMethod').value;
        
        if(name === "" || phone === "") {
            alert("Please fill in the required fields.");
            return;
        }

        const message = `New Order Request:%0A- Name: ${name}%0A- Phone: ${phone}%0A- Payment: ${payment}`;
        const url = `https://wa.me/8801606597522?text=${message}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
