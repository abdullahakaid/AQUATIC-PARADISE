<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUATIC PARADISE - Official Store</title>
    <style>
        :root { --main-orange: #f85606; --dark: #2c3e50; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .product-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .title { font-size: 22px; font-weight: 800; color: var(--dark); border-left: 5px solid var(--main-orange); padding-left: 10px; margin-bottom: 10px; }
        
        .video-box { margin-bottom: 15px; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        
        .actions { display: flex; gap: 20px; margin-bottom: 15px; }
        .btn-act { cursor: pointer; color: #555; font-weight: bold; font-size: 14px; }
        
        .qty-box { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .btn-add { background: var(--main-orange); color: white; border: none; padding: 12px 20px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">AQUATIC PARADISE</h1>

    <!-- TIGER COBRA GUPPY -->
    <div class="product-card">
        <div class="title">TIGER COBRA GUPPY</div>
        <p>দাম: ৳ ৩৫০ (জোড়া)</p>
        <div class="video-box">
            <video controls><source src="InShot_20260604_211622270.mp4" type="video/mp4"></video>
        </div>
        <div class="actions">
            <span class="btn-act" onclick="like(this)">❤️ লাইক (0)</span>
        </div>
        <button class="btn-add" onclick="order('Tiger Cobra Guppy', 350)">🛒 Add to Cart</button>
    </div>

    <!-- ভবিষ্যতে নতুন প্রোডাক্ট এখানে যোগ করবেন -->
    <!--
    <div class="product-card">
        <div class="title">RED METAL LACE</div>
        <p>দাম: ৳ [দাম]</p>
        <div class="video-box">
            <video controls><source src="your_video.mp4" type="video/mp4"></video>
        </div>
        <button class="btn-add" onclick="order('Red Metal Lace', price)">🛒 Add to Cart</button>
    </div>
    -->

</div>

<script>
    function like(el) {
        let count = parseInt(el.innerText.match(/\d+/)[0]);
        el.innerText = "❤️ লাইক (" + (count + 1) + ")";
    }

    function order(name, price) {
        let msg = "আমি " + name + " অর্ডার করতে চাই। দাম: " + price + " টাকা।";
        window.open("https://wa.me/8801606597522?text=" + encodeURIComponent(msg), "_blank");
    }
</script>
</body>
</html>
