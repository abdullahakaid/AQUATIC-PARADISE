<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUATIC PARADISE | Premium Shop</title>
    <style>
        :root { --orange: #f85606; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        
        /* Product Card */
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-name { font-size: 20px; font-weight: bold; color: var(--dark); border-bottom: 2px solid var(--orange); display: inline-block; }
        
        /* Video & Reaction */
        .video-wrapper { margin: 15px 0; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; }
        .reaction-bar { display: flex; gap: 20px; padding: 10px 0; border-top: 1px solid #eee; }
        .btn-react { cursor: pointer; color: #666; font-size: 14px; }
        
        /* Order Button */
        .order-btn { display: block; width: 100%; padding: 12px; background: var(--orange); color: white; text-align: center; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">AQUATIC PARADISE</h1>

    <!-- প্রোডাক্ট ১: টাইগার কোবরা -->
    <div class="card">
        <div class="product-name">TIGER COBRA GUPPY</div>
        <p>দাম: ৩৫০ টাকা (জোড়া)</p>
        <div class="video-wrapper">
            <video controls><source src="InShot_20260604_211622270.mp4" type="video/mp4"></video>
        </div>
        <div class="reaction-bar">
            <span class="btn-react" onclick="react(this)">❤️ লাইক (0)</span>
            <span class="btn-react" onclick="react(this)">🔥 সেরা (0)</span>
        </div>
        <a href="https://wa.me/8801606597522?text=I%20want%20to%20order%20Tiger%20Cobra" class="order-btn">WhatsApp-এ অর্ডার করুন</a>
    </div>

    <!-- ভবিষ্যতে নতুন প্রোডাক্ট যোগ করার জন্য এই কার্ডটি কপি করে বসাবেন -->
    <!-- 
    <div class="card">
        <div class="product-name">RED METAL LACE GUPPY</div>
        <p>দাম: [এখানে দাম লিখুন]</p>
        <div class="video-wrapper">
            <video controls><source src="আপনার_নতুন_ভিডিও_লিংক.mp4" type="video/mp4"></video>
        </div>
        <div class="reaction-bar">
            <span class="btn-react" onclick="react(this)">❤️ লাইক (0)</span>
            <span class="btn-react" onclick="react(this)">🔥 সেরা (0)</span>
        </div>
        <a href="#" class="order-btn">WhatsApp-এ অর্ডার করুন</a>
    </div> 
    -->

</div>

<script>
    function react(element) {
        let text = element.innerText;
        let count = parseInt(text.match(/\d+/)[0]);
        let baseText = text.replace(/\(\d+\)/, "");
        element.innerText = baseText + "(" + (count + 1) + ")";
    }
</script>
</body>
</html>
