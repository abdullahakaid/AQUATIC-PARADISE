<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AQUATIC PARADISE - Premium Aquarium Fish Bangladesh</title>

<meta name="description" content="Buy premium aquarium fish in Bangladesh. Guppy, Betta, Molly, Platy and more. Fast delivery & WhatsApp order.">
<meta name="keywords" content="aquarium fish bd, guppy fish, betta fish, aquatic paradise, fish shop bangladesh">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

.container{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:#111827;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#22c55e;
font-weight:bold;
margin:5px 0;
}

.btn{
display:inline-block;
padding:8px 12px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:8px;
font-size:12px;
margin-top:5px;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:14px;
cursor:pointer;
}

.commentBox{
margin-top:20px;
background:#111827;
padding:10px;
border-radius:10px;
}

input{
width:80%;
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:8px;
border:none;
background:#38bdf8;
color:black;
border-radius:6px;
cursor:pointer;
}

.comment{
font-size:13px;
margin-top:5px;
color:#cbd5e1;
}
</style>
</head>

<body>

<header>🐟 AQUATIC PARADISE</header>

<div class="container">

<h2>Premium Fish Collection</h2>

<div class="grid">

<!-- PRODUCT 1 -->
<div class="card">
<img src="https://i.imgur.com/5b6X7XK.jpg">
<h4>Guppy Fish</h4>
<div class="price">৳350 / Pair</div>

<a class="btn" href="https://wa.me/8801606597522">Order</a>

<div class="actions">
<div onclick="like(this)">❤️ <span>0</span></div>
<div onclick="alert('Use comment box below')">💬</div>
</div>
</div>

<!-- PRODUCT 2 -->
<div class="card">
<img src="https://i.imgur.com/2QZQZQZ.jpg">
<h4>Betta Fish</h4>
<div class="price">৳500</div>

<a class="btn" href="https://wa.me/8801606597522">Order</a>

<div class="actions">
<div onclick="like(this)">❤️ <span>0</span></div>
<div onclick="alert('Use comment box below')">💬</div>
</div>
</div>

<!-- PRODUCT 3 -->
<div class="card">
<img src="https://i.imgur.com/3R3R3R3.jpg">
<h4>Molly Fish</h4>
<div class="price">৳300</div>

<a class="btn" href="https://wa.me/8801606597522">Order</a>

<div class="actions">
<div onclick="like(this)">❤️ <span>0</span></div>
<div onclick="alert('Use comment box below')">💬</div>
</div>
</div>

</div>

<!-- COMMENT SECTION -->
<div class="commentBox">
<h3>Live Comments</h3>

<input id="cInput" placeholder="Write comment...">
<button onclick="addComment()">Post</button>

<div id="comments"></div>
</div>

</div>

<script>

// LIKE SYSTEM
function like(el){
let span = el.querySelector("span");
span.innerText = parseInt(span.innerText) + 1;
}

// COMMENT SYSTEM
function addComment(){
let input = document.getElementById("cInput");
if(input.value.trim() !== ""){
let div = document.createElement("div");
div.className = "comment";
div.innerText = "💬 " + input.value;
document.getElementById("comments").appendChild(div);
input.value = "";
}
}

</script>

</body>
</html>
