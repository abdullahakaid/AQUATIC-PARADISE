<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Cobra Guppy - Aquatic Paradise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-top: #060b13;
            --bg-bottom: #0b1528;
            --card-dark: #0f172a;
            --accent: #38bdf8;
            --primary-text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom)); color: var(--primary-text); padding-bottom: 90px; }
        
        /* Preloader */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #060b13; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Animated Glowing Border */
        .media-slider-box {
            position: relative;
            background: var(--card-dark);
            border-radius: 24px;
            overflow: hidden;
            margin: 20px auto;
            max-width: 600px;
            padding: 3px; /* Border Thickness */
            background: linear-gradient(45deg, var(--accent), #1e293b, var(--accent));
            background-size: 400% 400%;
            animation: gradient 3s ease infinite;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .slider-inner { border-radius: 21px; overflow: hidden; background: #000; }
        
        /* Premium Tag */
        .premium-tag {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
            color: white; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Navbar & Rest of the UI */
        .navbar { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 20px; font-weight: 800; color: var(--accent); }
        .main-container { max-width: 600px; margin: 0 auto; padding: 0 15px; }
        
        /* Buttons & Cards */
        .product-detail-card { background: var(--card-dark); padding: 20px; border-radius: 20px; }
        .btn-buy-whatsapp { background: #25D366; color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; margin-top: 15px; }
        
        /* Floating Button */
        .whatsapp-floating { position: fixed; bottom: 25px; right: 25px; background: #25D366; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px #25D366; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

    <div id="preloader"><div class="spinner"></div></div>

    <div class="navbar">
        <div class="logo"><h1>AQUATIC PARADISE</h1></div>
    </div>

    <div class="main-container">
        <!-- New Animated Glowing Box -->
        <div class="media-slider-box">
            <div class="premium-tag">PREMIUM STOCK</div>
            <div class="slider-inner">
                <video src="InShot_20260604_211622270.mp4" width="100%" controls playsinline></video>
            </div>
        </div>

        <div class="product-detail-card">
            <h3>Tiger Cobra Guppy Pair</h3>
            <p style="color: var(--accent); font-size: 24px; font-weight: 800; margin: 10px 0;">Tk 350</p>
            <button class="btn-buy-whatsapp" onclick="window.open('https://wa.me/8801606597522')">Buy Now via WhatsApp</button>
        </div>
    </div>

    <div class="whatsapp-floating" onclick="window.open('https://wa.me/8801606597522')">
        <i class="fa-brands fa-whatsapp" style="font-size: 30px; color: black;"></i>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('preloader').style.display = 'none', 600);
        });
    </script>
</body>
</html>
