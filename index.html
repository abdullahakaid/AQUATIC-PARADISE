<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Cobra Guppy - Aquatic Paradise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff5722; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #fff; min-height: 100vh; padding-bottom: 80px; }
        
        /* Premium Gallery */
        .gallery { display: grid; grid-template-columns: 1fr; gap: 5px; padding: 10px; }
        .gallery video { width: 100%; border-radius: 8px; background: #000; }
        
        .info { padding: 15px; }
        .title { font-size: 20px; font-weight: bold; }
        .price { color: var(--primary); font-size: 24px; font-weight: 800; margin: 10px 0; }
        
        /* Advanced Cart Controls */
        .cart-box { display: flex; align-items: center; gap: 15px; padding: 15px; border-top: 1px solid #eee; }
        .qty-input { width: 50px; text-align: center; border: 1px solid #ccc; padding: 5px; }
        .btn-add { background: var(--primary); color: #fff; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; flex-grow: 1; }

        /* Comment & Rating */
        .section { padding: 15px; border-top: 10px solid #f4f4f4; }
        .rating { color: #f39c12; font-size: 18px; margin-bottom: 10px; }
        .comment { background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Gallery -->
    <div class="gallery">
        <video controls><source src="InShot_20260604_211622270.mp4" type="video/mp4"></video>
        <video controls><source src="InShot_20260604_210654716.mp4" type="video/mp4"></video>
        <video controls><source src="InShot_20260604_210050619.mp4" type="video/mp4"></video>
    </div>

    <!-- Product Details -->
    <div class="info">
        <div class="title">Tiger Cobra Guppy - Show Quality Pair</div>
        <div class="price">Tk 350</div>
        <div class="rating">★★★★★ <span style="color:#555; font-size: 14px;">(4.9/5)</span></div>
    </div>

    <!-- Cart -->
    <div class="cart-box">
        <input type="number" id="qty" class="qty-input" value="1" min="1">
        <button class="btn-add" onclick="order()">BUY NOW</button>
    </div>

    <!-- Comments -->
    <div class="section">
        <h3>Customer Reviews</h3>
        <div class="comment"><b>Rahim:</b> দারুণ মাছ, একদম ভিডিওর মতোই!</div>
        <div class="comment"><b>Karim:</b> সুস্থ সবল মাছ পেয়েছি, ধন্যবাদ।</div>
    </div>
</div>

<script>
    function order() {
        let q = document.getElementById('qty').value;
        let msg = `আমি Tiger Cobra Guppy কিনতে চাই। পরিমাণ: ${q} Pair।`;
        window.open("https://wa.me/8801606597522?text=" + encodeURIComponent(msg), '_blank');
    }
</script>
</body>
</html>
