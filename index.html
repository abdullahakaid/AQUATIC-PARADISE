<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Cobra Guppy - Luxury Aquatic Paradise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #05070f; --card-dark: #0b111e; --accent: #38bdf8; --primary-text: #f8fafc; --secondary-text: #94a3b8; --iphone-glow: 0 0 35px rgba(56, 189, 248, 0.45); --btn-glow: 0 4px 20px rgba(37, 211, 102, 0.4); --aurora-1: rgba(56, 189, 248, 0.25); --aurora-2: rgba(139, 92, 246, 0.2); }
        [data-theme="moonlight"] { --bg-dark: #040a12; --card-dark: #0d1726; --accent: #2dd4bf; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--primary-text); padding-bottom: 80px; overflow-x: hidden; transition: background-color 0.4s ease; }
        .aurora-bg { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; z-index: -4; background: radial-gradient(circle at 15% 15%, var(--aurora-1) 0%, transparent 45%), radial-gradient(circle at 85% 85%, var(--aurora-2) 0%, transparent 45%); filter: blur(60px); pointer-events: none; }
        
        /* অন্যান্য সব স্টাইল এখানে আছে */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05070f; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .navbar { background: rgba(5, 7, 15, 0.75); backdrop-filter: blur(15px); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .media-slider-box { position: relative; background: var(--card-dark); border-radius: 16px; margin: 20px 15px; padding: 1px; border: 1px solid rgba(56, 189, 248, 0.4); }
        .slider-wrapper { position: relative; width: 100%; height: 320px; display: flex; overflow: hidden; border-radius: 14px; }
        .slide-item { min-width: 100%; height: 100%; display: none; }
        .slide-item.active { display: block; }
        .slide-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .product-detail-card { background: var(--card-dark); border-radius: 16px; padding: 20px; margin: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .p-price { font-size: 26px; font-weight: 800; color: var(--accent); margin: 12px 0; }
        .qty-control-box { display: flex; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; width: fit-content; margin-bottom: 20px; }
        .qty-control-box button { background: rgba(255,255,255,0.08); color: white; border: none; padding: 10px 15px; cursor: pointer; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-main { padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn-buy-whatsapp { background: #25D366; color: black; box-shadow: var(--btn-glow); }
        .btn-cart-add { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.08); }
        
        .cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: var(--card-dark); z-index: 2000; transition: 0.3s right; }
        .cart-sidebar.open { right: 0; }
        .btn-checkout { width: 100%; background: var(--accent); color: var(--bg-dark); border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; text-align: center; display: block; text-decoration: none; }
    </style>
</head>
<body>
    <div class="aurora-bg"></div>
    <div id="preloader">Loading...</div>

    <div class="navbar"><h1>AQUATIC PARADISE</h1></div>

    <div class="media-slider-box">
        <div class="slider-wrapper">
            <div class="slide-item active"><video src="InShot_20260604_211622270.mp4" controls playsinline></video></div>
        </div>
    </div>

    <div class="product-detail-card">
        <h2 id="item-title">Tiger Cobra Guppy - Show Quality Pair</h2>
        <div class="p-price">Tk <span id="unit-price">350</span></div>
        <div class="qty-control-box">
            <button onclick="updateQty(-1)">-</button>
            <div id="qty-val" style="padding: 0 15px;">1</div>
            <button onclick="updateQty(1)">+</button>
        </div>
        <div class="action-grid">
            <button class="btn-main btn-cart-add" onclick="addToCart()"><i class="fa-solid fa-cart-plus"></i> Add To Cart</button>
            <button class="btn-main btn-buy-whatsapp" onclick="saveCartAndCheckout()"><i class="fa-brands fa-whatsapp"></i> Buy Now</button>
        </div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div style="padding: 20px;">
            <h3>Shopping Cart</h3>
            <div id="cart-items-container" style="margin: 20px 0;"></div>
            <div class="total-row" style="margin-bottom: 20px;">Total: <span id="cart-total-display">Tk 0</span></div>
            <button class="btn-checkout" onclick="saveCartAndCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        let currentQuantity = 1;
        const baseItemPrice = 350;

        function updateQty(val) {
            currentQuantity = Math.max(1, currentQuantity + val);
            document.getElementById('qty-val').innerText = currentQuantity;
            document.getElementById('unit-price').innerText = baseItemPrice * currentQuantity;
        }

        function addToCart() {
            // আপনার আগের কার্ট লজিক এখানে থাকবে
            document.getElementById('cart-sidebar').classList.add('open');
            document.getElementById('cart-total-display').innerText = "Tk " + (baseItemPrice * currentQuantity);
            document.getElementById('cart-items-container').innerText = "Tiger Cobra Guppy (x" + currentQuantity + ")";
        }

        function saveCartAndCheckout() {
            const qty = document.getElementById('qty-val').innerText;
            const total = document.getElementById('unit-price').innerText;
            const name = document.getElementById('item-title').innerText;
            
            // ডাটা সেভ করছি চেকআউট পেজে পাঠানোর জন্য
            localStorage.setItem('checkoutInfo', JSON.stringify({
                product: name,
                qty: qty,
                total: total
            }));
            window.location.href = 'checkout.html';
        }

        // আপনার আগের সব স্ক্র্যাচ কার্ড, স্লাইডার এবং অন্যান্য স্ক্রিপ্ট এখানে বসিয়ে দিন
    </script>
</body>
</html>
