<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Tiger Cobra Guppy - Luxury Aquatic Paradise</title>
    <style>
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05070f; z-index: 9999; display: flex; align-items: center; justify-content: center; color: #38bdf8; font-size: 20px; }
        /* বাকি CSS আগের মতোই রাখুন */
    </style>
</head>
<body>
    <div id="preloader">Loading Luxury Experience...</div>

    <div class="product-detail-card">
        <h2 id="item-title">Tiger Cobra Guppy - Show Quality Pair</h2>
        <div class="p-price">Tk <span id="unit-price">350</span></div>
        <div class="qty-control-box">
            <button onclick="updateQty(-1)">-</button>
            <div id="qty-val" style="padding:0 10px;">1</div>
            <button onclick="updateQty(1)">+</button>
        </div>
        <button class="btn-main" onclick="saveCartAndCheckout()">Buy Now</button>
    </div>

    <script>
        // প্রিলোডার ফিক্স: ৩ সেকেন্ডের মধ্যে অটো হাইড হবে (যদি এর আগে লোড হয় তো ভালো)
        window.addEventListener('load', () => {
            const loader = document.getElementById('preloader');
            loader.style.display = 'none';
        });
        setTimeout(() => { document.getElementById('preloader').style.display = 'none'; }, 3000);

        let currentQuantity = 1;
        const baseItemPrice = 350;

        function updateQty(val) {
            currentQuantity = Math.max(1, currentQuantity + val);
            document.getElementById('qty-val').innerText = currentQuantity;
            document.getElementById('unit-price').innerText = baseItemPrice * currentQuantity;
        }

        function saveCartAndCheckout() {
            const qty = document.getElementById('qty-val').innerText;
            const total = document.getElementById('unit-price').innerText;
            const name = document.getElementById('item-title').innerText;
            
            localStorage.setItem('checkoutInfo', JSON.stringify({
                product: name,
                qty: qty,
                total: total
            }));
            window.location.href = 'checkout.html';
        }
        
        // আপনার স্ক্র্যাচ কার্ড ও স্লাইডার ফাংশনগুলো এখানে বসান
    </script>
</body>
</html>
