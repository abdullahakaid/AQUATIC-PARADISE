<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Cobra Guppy - Luxury Aquatic Paradise</title>
    
    <meta name="description" content="Premium quality Tiger Cobra Guppy Pair in Chattogram. Order instantly via WhatsApp.">
    <meta name="keywords" content="Tiger Cobra Guppy, Guppy Chattogram, Aquatic Paradise CTG">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #05070f;
            --card-dark: #0b111e;
            --accent: #38bdf8;
            --primary-text: #f8fafc;
            --secondary-text: #94a3b8;
            --star-color: #fbbf24;
            --heart-color: #f43f5e;
            --iphone-glow: 0 0 35px rgba(56, 189, 248, 0.45);
            --btn-glow: 0 4px 20px rgba(37, 211, 102, 0.4);
            --aurora-1: rgba(56, 189, 248, 0.25);
            --aurora-2: rgba(139, 92, 246, 0.2);
        }

        [data-theme="moonlight"] {
            --bg-dark: #040a12;
            --card-dark: #0d1726;
            --accent: #2dd4bf;
            --primary-text: #f1f5f9;
            --secondary-text: #cbd5e1;
            --iphone-glow: 0 0 35px rgba(45, 212, 191, 0.45);
            --aurora-1: rgba(45, 212, 191, 0.25);
            --aurora-2: rgba(20, 184, 166, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-dark); color: var(--primary-text); padding-bottom: 80px; overflow-x: hidden; position: relative; transition: background-color 0.4s ease; }

        .aurora-bg { position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; z-index: -4; background: radial-gradient(circle at 15% 15%, var(--aurora-1) 0%, transparent 45%), radial-gradient(circle at 85% 85%, var(--aurora-2) 0%, transparent 45%); filter: blur(60px); pointer-events: none; }

        /* Navbar */
        .navbar { background: rgba(5, 7, 15, 0.75); backdrop-filter: blur(15px); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .logo h1 { font-size: 16px; font-weight: 800; color: var(--accent); }
        .nav-actions { display: flex; align-items: center; gap: 12px; }
        .nav-btn { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); color: var(--primary-text); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .badge { position: absolute; top: -3px; right: -3px; background: var(--heart-color); color: white; font-size: 9px; padding: 2px 5px; border-radius: 50%; }

        /* Product Styles */
        .main-container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .product-detail-card { background: var(--card-dark); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.03); }
        .p-price { font-size: 26px; font-weight: 800; color: var(--accent); margin: 12px 0; }
        .btn-buy-whatsapp { background: #25D366; color: black; padding: 14px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; width: 100%; box-shadow: var(--btn-glow); }

        /* Bottom Sheet */
        .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(11, 17, 30, 0.95); backdrop-filter: blur(25px); z-index: 2500; border-top-left-radius: 24px; border-top-right-radius: 24px; transform: translateY(100%); transition: 0.35s; padding: 20px; }
        .bottom-sheet.open { transform: translateY(0); }
        .form-group input { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: white; }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>

    <div class="navbar">
        <div class="logo"><h1>AQUATIC PARADISE</h1></div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="toggleCart(true)"><i class="fa-solid fa-bag-shopping"></i></button>
        </div>
    </div>

    <div class="main-container">
        <div class="product-detail-card" id="product-info">
            <h2>Tiger Cobra Guppy</h2>
            <div class="p-price">Tk <span id="unit-price">350</span></div>
            <button class="btn-buy-whatsapp" onclick="openOrderSheet('direct')">Buy Now</button>
        </div>
    </div>

    <!-- Order Sheet -->
    <div class="bottom-sheet" id="order-sheet">
        <h3>Confirm Order</h3>
        <div class="form-group">
            <input type="text" id="cust-name" placeholder="Enter your name">
        </div>
        <br>
        <button class="btn-buy-whatsapp" onclick="submitWhatsAppOrder()">Send to WhatsApp</button>
        <button onclick="closeOrderSheet()" style="background:none; border:none; color:white; margin-top:10px; width:100%;">Cancel</button>
    </div>

    <script>
        let currentQuantity = 1;
        let baseItemPrice = 350;
        let checkoutType = 'direct';
        let cart = [{ name: "Tiger Cobra Guppy Pair", qty: 1, total: 350 }];

        function openOrderSheet(type) {
            checkoutType = type;
            document.getElementById('order-sheet').classList.add('open');
        }
        function closeOrderSheet() {
            document.getElementById('order-sheet').classList.remove('open');
        }
        function toggleCart(open) { /* Cart Logic */ }

        // এই ফাংশনটি আপনার কাঙ্ক্ষিত স্টাইলে সেট করা হয়েছে
        function submitWhatsAppOrder() {
            let name = document.getElementById('cust-name').value.trim();
            if(!name) { alert("দয়া করে আপনার নাম লিখুন।"); return; }
            
            let qty = currentQuantity;
            let subtotal = baseItemPrice * qty;
            let grandTotal = subtotal;

            let msg = `Hello Aquatic Paradise, Checking out my cart (Chattogram):%0A%0A`;
            msg += `🛒 Details:%0A`;
            msg += `- Tiger Cobra Guppy Pair (CTG Stock) (x${qty})%0A`;
            msg += `%0A💵 Grand Total: ${grandTotal} Tk`;

            window.open(`https://wa.me/8801606597522?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
