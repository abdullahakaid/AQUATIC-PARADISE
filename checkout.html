<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout</title>
    <style>
        body { background: #05070f; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .checkout-box { background: rgba(11, 17, 30, 0.9); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: #05070f; border: 1px solid #333; color: white; box-sizing: border-box; }
        .btn-order { width: 100%; padding: 15px; background: #25D366; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; color: black; }
    </style>
</head>
<body onload="loadCheckout()">

<div class="checkout-box">
    <h2>Secure Checkout</h2>
    <div id="order-summary" style="margin-bottom: 20px; padding:10px; background:rgba(56, 189, 248, 0.1); border-radius:10px;"></div>
    
    <input type="text" id="fullName" placeholder="Full Name" required>
    <input type="tel" id="phoneNumber" placeholder="Phone Number" required>
    <select id="paymentMethod">
        <option value="Cash on Delivery">Cash on Delivery</option>
        <option value="Nagad">Nagad</option>
        <option value="Bkash">Bkash</option>
    </select>
    <button class="btn-order" onclick="sendToWhatsApp()">Order via WhatsApp</button>
    <a href="index.html" style="color: #94a3b8; display:block; text-align:center; margin-top:20px; font-size:14px;">← Back to shop</a>
</div>

<script>
    function loadCheckout() {
        const data = JSON.parse(localStorage.getItem('checkoutInfo'));
        if(data) {
            document.getElementById('order-summary').innerHTML = `
                🛒 <strong>${data.product} (x${data.qty})</strong><br>
                💵 <strong>Grand Total: ${data.total} Tk</strong>
            `;
        }
    }

    function sendToWhatsApp() {
        const data = JSON.parse(localStorage.getItem('checkoutInfo'));
        const name = document.getElementById('fullName').value;
        const phone = document.getElementById('phoneNumber').value;
        const payment = document.getElementById('paymentMethod').value;
        
        if(!name || !phone) { alert("Please fill name and phone."); return; }

        const message = `Hello Aquatic Paradise, Checking out my cart (Chattogram):%0A%0A🛒 Details:%0A- ${data.product} (x${data.qty})%0A%0A💵 Grand Total: ${data.total} Tk%0A%0A👤 Customer Name: ${name}%0A📞 Phone: ${phone}%0A💳 Payment: ${payment}`;
        
        window.open(`https://wa.me/8801606597522?text=${message}`, '_blank');
    }
</script>
</body>
</html>
